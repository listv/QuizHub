name: QuizHub CI/CD

on:
  push:
    branches:
      - main
      - staging

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════
  # BUILD & PUSH DOCKER IMAGES
  # ══════════════════════════════════════
  build:
    name: Build & Push Images
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "tag=prod-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=staging-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/quizhub-api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/quizhub-api:${{ github.ref_name }}-latest

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/quizhub-client:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/quizhub-client:${{ github.ref_name }}-latest

  # ══════════════════════════════════════
  # DEPLOY TO STAGING
  # ══════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: build
    if: github.ref_name == 'staging'
    environment: staging

    steps:
      - name: Deploy
        run: |
          set -e
          cd /opt/quizhub/QuizHub

          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env.staging
          echo "JWT_KEY=${{ secrets.JWT_KEY }}" >> .env.staging
          echo "APP_GITHUB_OWNER=${{ secrets.APP_GITHUB_OWNER }}" >> .env.staging

          docker pull ghcr.io/${{ secrets.APP_GITHUB_OWNER }}/quizhub-api:staging-latest
          docker pull ghcr.io/${{ secrets.APP_GITHUB_OWNER }}/quizhub-client:staging-latest

          export PATH="$PATH:$HOME/.dotnet/tools"
          docker compose -f docker-compose.staging.yml --env-file .env.staging up -d

      - name: Health check
        run: |
          sleep 15
          curl -sf http://localhost:5001/health && echo "Staging healthy" || echo "Not ready"

  # ══════════════════════════════════════
  # DEPLOY TO PRODUCTION
  # ══════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build
    if: github.ref_name == 'main'
    environment: production

    steps:
      - name: Backup DB
        run: |
          mkdir -p /opt/quizhub/backups
          docker exec quizhub-db pg_dump -U postgres quizhub > /opt/quizhub/backups/quizhub_$(date +%Y%m%d_%H%M%S).sql

      - name: Deploy
        run: |
          set -e
          cd /opt/quizhub/QuizHub

          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          echo "JWT_KEY=${{ secrets.JWT_KEY }}" >> .env
          echo "APP_GITHUB_OWNER=${{ secrets.APP_GITHUB_OWNER }}" >> .env

          docker pull ghcr.io/${{ secrets.APP_GITHUB_OWNER }}/quizhub-api:prod-latest
          docker pull ghcr.io/${{ secrets.APP_GITHUB_OWNER }}/quizhub-client:prod-latest

          export PATH="$PATH:$HOME/.dotnet/tools"
          docker compose -f docker-compose.prod.yml --env-file .env up -d

      - name: Health check
        run: |
          sleep 15
          curl -sf http://localhost:5000/health && echo "Production healthy" || echo "Not ready"